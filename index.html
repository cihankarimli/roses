<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khadicike 🌸</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: radial-gradient(
          ellipse at 50% 30%,
          #2a0a1e 0%,
          #0e0008 100%
        );
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: "Dancing Script", cursive;
      }
      .star {
        position: fixed;
        background: #fff;
        border-radius: 50%;
        animation: twinkle var(--d) var(--dl) infinite ease-in-out;
        opacity: 0;
        pointer-events: none;
      }
      @keyframes twinkle {
        0%,
        100% {
          opacity: 0;
        }
        50% {
          opacity: 0.85;
        }
      }

      /* ── INTRO ── */
      #intro {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        pointer-events: none;
      }
      .il {
        opacity: 0;
        transform: translateY(28px);
        transition:
          opacity 0.9s ease,
          transform 0.9s ease;
        text-align: center;
        padding: 0 20px;
      }
      .il.show {
        opacity: 1;
        transform: translateY(0);
      }
      .il1 {
        font-size: clamp(1.3rem, 4.5vw, 2.6rem);
        font-weight: 400;
        color: #f9d0e8;
        letter-spacing: 3px;
        text-shadow:
          0 0 28px rgba(255, 120, 180, 0.7),
          0 0 55px rgba(200, 0, 100, 0.3);
      }
      .il2 {
        font-size: clamp(2rem, 7vw, 4.2rem);
        font-weight: 700;
        background: linear-gradient(
          135deg,
          #fde0ec 0%,
          #ff80c0 35%,
          #f7c948 65%,
          #fde0ec 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 3s linear infinite;
        letter-spacing: 4px;
        margin-top: 6px;
        filter: drop-shadow(0 0 20px rgba(255, 100, 180, 0.95));
      }
      .cookie-anim {
        font-size: clamp(2rem, 7vw, 3.8rem);
        display: inline-block;
        animation: cb 1.2s ease-in-out infinite;
        filter: drop-shadow(0 0 12px rgba(247, 201, 72, 0.85));
      }
      @keyframes cb {
        0%,
        100% {
          transform: scale(1) rotate(-5deg);
        }
        50% {
          transform: scale(1.18) rotate(5deg);
        }
      }
      @keyframes shimmer {
        0% {
          background-position: 0%;
        }
        100% {
          background-position: 200%;
        }
      }
      #intro.fadeout {
        animation: iOut 0.8s ease forwards;
      }
      @keyframes iOut {
        0% {
          opacity: 1;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(1.05);
        }
      }

      /* ── SCENE ── */
      #scene {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(6px, 2vw, 18px);
        padding: 14px;
        width: 100%;
        opacity: 0;
        transition: opacity 1s;
      }
      #scene.show {
        opacity: 1;
      }
      .bwrap {
        width: min(400px, 94vw);
        aspect-ratio: 3/4;
        position: relative;
      }
      .bwrap svg {
        width: 100%;
        height: 100%;
        overflow: visible;
        /* Tek bir basit gölge — mobilde ağır filter stack yok */
        filter: drop-shadow(0 6px 28px rgba(200, 20, 100, 0.55));
      }

      /* ── ANIMASYONLAR — GPU-dostu, will-change ile ── */
      .pg {
        opacity: 0;
        transform: scale(0.05) translateY(10px);
        /* will-change ile GPU katmanı önceden hazırlanır */
        will-change: transform, opacity;
        transform-origin: inherit;
        /* transition yerine animation kullanıyoruz — daha akıcı */
      }
      .pg.open {
        animation: bloomPetal 0.7s cubic-bezier(0.15, 1.4, 0.45, 1) forwards;
      }
      @keyframes bloomPetal {
        0% {
          opacity: 0;
          transform: scale(0.05) translateY(10px);
        }
        60% {
          opacity: 1;
          transform: scale(1.06) translateY(-2px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      .sp {
        stroke-dasharray: 340;
        stroke-dashoffset: 340;
        will-change: stroke-dashoffset;
        transition: stroke-dashoffset 1.1s ease-out;
      }
      .sp.grow {
        stroke-dashoffset: 0;
      }

      .lf {
        opacity: 0;
        transform-origin: 50% 90%;
        transform: scale(0);
        will-change: transform, opacity;
        transition:
          opacity 0.6s,
          transform 0.6s cubic-bezier(0.15, 1.5, 0.45, 1);
      }
      .lf.show {
        opacity: 1;
        transform: scale(1);
      }

      .rb {
        opacity: 0;
        transform: scale(0);
        transform-origin: 50% 70%;
        will-change: transform, opacity;
        transition:
          opacity 0.5s,
          transform 0.55s cubic-bezier(0.15, 1.5, 0.45, 1);
      }
      .rb.show {
        opacity: 1;
        transform: scale(1);
      }

      .kw {
        opacity: 0;
        transform: scale(0);
        transform-origin: 50% 92%;
        will-change: transform, opacity;
        transition:
          opacity 0.55s,
          transform 0.6s cubic-bezier(0.2, 1.3, 0.45, 1);
      }
      .kw.show {
        opacity: 1;
        transform: scale(1);
      }

      /* ── SCROLL TEXT ── */
      .tt {
        width: min(400px, 96vw);
        overflow: hidden;
        position: relative;
        padding: 5px 0;
        opacity: 0;
        transform: translateY(14px);
        transition:
          opacity 0.9s,
          transform 0.9s;
      }
      .tt.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .tt::before,
      .tt::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        width: 55px;
        z-index: 2;
        pointer-events: none;
      }
      .tt::before {
        left: 0;
        background: linear-gradient(to right, #0e0008, transparent);
      }
      .tt::after {
        right: 0;
        background: linear-gradient(to left, #0e0008, transparent);
      }
      .trow {
        display: flex;
        align-items: center;
        gap: 10px;
        white-space: nowrap;
        animation: sc 8s linear infinite;
      }

      .ic {
        font-size: clamp(1rem, 3vw, 1.4rem);
        animation: sw 2s ease-in-out infinite;
        display: inline-block;
      }
      @keyframes sw {
        0%,
        100% {
          transform: rotate(-10deg);
        }
        50% {
          transform: rotate(10deg);
        }
      }
      @keyframes sc {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }

      .fp {
        position: fixed;
        pointer-events: none;
        animation: fall linear forwards;
        opacity: 0;
      }
      @keyframes fall {
        0% {
          opacity: 1;
          transform: translateY(0) rotate(0);
        }
        100% {
          opacity: 0;
          transform: translateY(110vh) rotate(560deg);
        }
      }
      .text {
        color: #ffb1d8;
        font-size: 34px;
        margin-top: 30px;
        opacity: 0;
        text-shadow:
          0 0 28px rgba(255, 120, 180, 0.7),
          0 0 55px rgba(200, 0, 100, 0.3);
        animation: showText 2s ease forwards;
      }
      @keyframes showText {
        to {
          opacity: 1;
        }
      }
    </style>

    <script>
      // Stars
      for (var i = 0; i < 80; i++) {
        var s = document.createElement("div");
        s.className = "star";
        var sz = Math.random() * 2 + 0.4;
        s.style.cssText =
          "width:" +
          sz +
          "px;height:" +
          sz +
          "px;" +
          "top:" +
          Math.random() * 100 +
          "%;left:" +
          Math.random() * 100 +
          "%;" +
          "--d:" +
          (Math.random() * 3 + 2).toFixed(1) +
          "s;" +
          "--dl:-" +
          (Math.random() * 5).toFixed(1) +
          "s;";
        document.body.appendChild(s);
      }

      // Scroll text build

      // Intro sequence
      [
        { id: "il1", d: 300 },
        { id: "il2", d: 900 },
        { id: "il4", d: 1900 },
      ].forEach(function (x) {
        setTimeout(function () {
          var el = document.getElementById(x.id);
          if (el) el.classList.add("show");
        }, x.d);
      });

      setTimeout(function () {
        document.getElementById("intro").classList.add("fadeout");
        setTimeout(function () {
          document.getElementById("intro").style.display = "none";
          document.getElementById("scene").classList.add("show");
          // requestAnimationFrame garanti eder ki browser render'a hazır
          requestAnimationFrame(function () {
            requestAnimationFrame(bloom);
          });
        }, 850);
      }, 3500);

      function bloom() {
        // Stems
        ["s0", "s1", "s2", "s3", "s4"].forEach(function (id, i) {
          setTimeout(function () {
            document.getElementById(id).classList.add("grow");
          }, i * 80);
        });

        // Kraft wrap
        setTimeout(function () {
          document.getElementById("kw").classList.add("show");
        }, 150);

        // Leaves
        ["ll1", "ll2", "ll3", "ll4"].forEach(function (id, i) {
          setTimeout(
            function () {
              document.getElementById(id).classList.add("show");
            },
            420 + i * 120,
          );
        });

        // Flowers — sıralı açılım, her biri bir önceki bittikten sonra
        var flowers = [
          { id: "ffl", d: 600 },
          { id: "ffright", d: 780 },
          { id: "fleft", d: 1000 },
          { id: "fright", d: 1180 },
          { id: "fcen", d: 1480 },
        ];
        flowers.forEach(function (o) {
          setTimeout(function () {
            // force reflow önce — mobilde transform-origin'i yerleştirir
            var el = document.getElementById(o.id);
            el.getBoundingClientRect();
            el.classList.add("open");
          }, o.d);
        });

        setTimeout(function () {
          document.getElementById("rbow").classList.add("show");
        }, 1980);
        setTimeout(function () {
          document.getElementById("tt").classList.add("visible");
        }, 2300);
        setTimeout(startFalling, 2500);
      }

      // Falling petals
      var emojis = ["🌸", "🌺", "🌷", "🌹"];
      function dropPetal() {
        var el = document.createElement("div");
        el.className = "fp";
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        var dur = Math.random() * 4 + 5;
        el.style.cssText =
          "left:" +
          Math.random() * 100 +
          "vw;" +
          "top:-28px;" +
          "animation-duration:" +
          dur +
          "s;" +
          "font-size:" +
          (Math.random() * 0.8 + 0.75) +
          "rem;";
        document.body.appendChild(el);
        setTimeout(
          function () {
            if (el.parentNode) el.parentNode.removeChild(el);
          },
          (dur + 1) * 1000,
        );
      }
      function startFalling() {
        for (var i = 0; i < 6; i++) setTimeout(dropPetal, i * 300);
        setInterval(dropPetal, 1600);
      }
    </script>
  </body>
</html>
